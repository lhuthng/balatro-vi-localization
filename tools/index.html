<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balatro VI Localization Tool</title>
    <style>
        @font-face {
            font-family: "balatro";
            src: url("../fonts/m6x11plus_vi.ttf") format("truetype");
        }

        :root {
            --bg-1: #f6e9d0;
            --bg-2: #dfc69c;
            --bg-3: #c6a06f;
            --panel: rgba(255, 247, 235, 0.88);
            --panel-deep: rgba(255, 235, 205, 0.9);
            --ink: #20150b;
            --muted: #7b6551;
            --accent: #1d8a64;
            --accent-deep: #11664a;
            --accent-2: #bf6a29;
            --line: #ddb98e;
            --glow: rgba(23, 143, 103, 0.22);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            background:
                radial-gradient(circle at 7% 12%, rgba(255, 244, 210, 0.95) 0%, transparent 38%),
                radial-gradient(circle at 92% 14%, rgba(255, 222, 172, 0.9) 0%, transparent 30%),
                radial-gradient(circle at 50% 90%, rgba(191, 106, 41, 0.18) 0%, transparent 45%),
                linear-gradient(145deg, var(--bg-1), var(--bg-2) 58%, var(--bg-3));
            font-family: "balatro", sans-serif;
            font-size: 17px;
            letter-spacing: 0.1px;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 26px 26px;
            opacity: 0.18;
            z-index: -1;
        }

        .app {
            position: relative;
            min-height: 100vh;
            padding: 18px 20px 18px 390px;
        }

        #mainContainer {
            min-height: calc(100vh - 36px);
            overflow: auto;
            border: 1px solid var(--line);
            border-radius: 1px;
            background: color-mix(in srgb, var(--panel) 88%, #fff4e4);
            padding: 12px;
            box-shadow:
                0 22px 40px rgba(56, 33, 9, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(3px);
        }

        .sidebar {
            position: fixed;
            top: 18px;
            left: 20px;
            bottom: 18px;
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: auto;
            padding-right: 2px;
        }

        .panel {
            background: linear-gradient(180deg, color-mix(in srgb, var(--panel) 92%, white), color-mix(in srgb, var(--panel-deep) 94%, white));
            border: 1px solid var(--line);
            border-radius: 1px;
            padding: 14px;
            box-shadow:
                0 12px 24px rgba(46, 26, 8, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.85);
        }

        #loadingBox {
            border-color: color-mix(in srgb, var(--accent) 25%, var(--line));
            box-shadow:
                0 16px 28px rgba(20, 102, 75, 0.14),
                0 0 0 1px rgba(255, 255, 255, 0.45) inset;
        }

        .panel h2 {
            margin: 0 0 10px;
            font-size: 22px;
            line-height: 1.1;
            letter-spacing: 0.3px;
        }

        .help {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.4;
        }

        .controls {
            display: grid;
            gap: 10px;
        }

        input[type="file"],
        input[type="text"],
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 1px;
            background: rgba(255, 253, 247, 0.95);
            color: var(--ink);
            font-family: inherit;
            font-size: 16px;
        }

        input[type="text"],
        textarea {
            padding: 9px 12px;
        }

        textarea {
            resize: none;
            overflow: hidden;
            min-height: 80px;
        }

        input[type="text"]:focus,
        textarea:focus,
        input[type="file"]:focus {
            outline: none;
            border-color: color-mix(in srgb, var(--accent) 65%, var(--line));
            box-shadow: 0 0 0 3px var(--glow);
        }

        .styledButton {
            width: 100%;
            min-height: 42px;
            padding: 9px 12px;
            cursor: pointer;
            transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease, background-color 120ms ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: 1px;
            border: 1px solid color-mix(in srgb, var(--accent) 35%, #123d2f);
            background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 88%, white), var(--accent-deep));
            color: #ffffff;
            font-weight: 600;
            font-family: inherit;
            box-shadow: 0 9px 18px rgba(13, 122, 95, 0.2);
            text-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
        }

        .styledButton:hover:enabled {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 12px 24px rgba(13, 122, 95, 0.25);
            filter: brightness(1.06);
        }

        .styledButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .styledButton.wait {
            background: linear-gradient(180deg, color-mix(in srgb, var(--accent-2) 85%, white), var(--accent-2));
            border-color: color-mix(in srgb, var(--accent-2) 75%, #4d2b12);
            box-shadow: 0 10px 20px rgba(191, 106, 41, 0.25);
        }

        .objectContainer {
            border: 1px solid var(--line);
            margin: 8px;
            padding: 8px;
            background: rgba(255, 253, 248, 0.92);
            border-radius: 1px;
        }

        .v-box,
        .v-box-2 {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }

        .v-box .styledButton,
        .v-box-2 .styledButton {
            width: auto;
            min-width: 70px;
            min-height: 36px;
        }

        .textContainer {
            margin-top: 8px;
        }

        .sectionLabel {
            color: var(--muted);
            font-size: 15px;
        }

        #quickNavigator {
            display: flex;
            flex-direction: column;
            gap: 7px;
            max-height: 34vh;
            overflow: auto;
            padding-right: 2px;
        }

        #quickNavigator a {
            color: #15553f;
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 1px;
            border: 1px dashed color-mix(in srgb, var(--line) 65%, transparent);
            background: rgba(255, 253, 247, 0.75);
            transition: transform 110ms ease, background-color 110ms ease;
        }

        #quickNavigator a:hover {
            border-color: color-mix(in srgb, var(--accent) 55%, transparent);
            background: color-mix(in srgb, var(--accent) 16%, white);
            transform: translateX(2px);
        }

        .focus {
            background: color-mix(in srgb, var(--accent) 20%, white);
        }

        .row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 6px;
        }

        .row label {
            font-size: 15px;
        }

        .status {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.35;
        }

        #replacementTool .styledButton {
            background: linear-gradient(180deg, color-mix(in srgb, var(--accent-2) 78%, white), color-mix(in srgb, var(--accent-2) 92%, #8b4312));
            border-color: color-mix(in srgb, var(--accent-2) 80%, #5d2a0f);
            box-shadow: 0 10px 18px rgba(191, 106, 41, 0.22);
        }

        #replacementTool .styledButton:hover:enabled {
            box-shadow: 0 12px 22px rgba(191, 106, 41, 0.27);
        }

        @media (max-width: 980px) {
            .app {
                padding: 14px;
            }

            #mainContainer {
                min-height: 58vh;
                margin-top: 0;
            }

            .sidebar {
                position: static;
                width: auto;
                max-height: none;
                margin-bottom: 12px;
                padding-right: 0;
            }

            .app {
                display: flex;
                flex-direction: column;
            }

            .sidebar {
                order: 1;
            }

            #mainContainer {
                order: 2;
            }

            #quickNavigator {
                max-height: 24vh;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <section id="loadingBox" class="panel">
                <h2>Load and Export</h2>
                <p class="help">Load localization JSON, edit values, then export JSON or Lua.</p>
                <div class="controls">
                    <input type="file" id="fileInput" accept="application/json" />
                    <button id="saveButton1" class="styledButton" onClick="save()" disabled>Save JSON</button>
                    <button id="saveButton2" class="styledButton" onClick="saveAsLua()" disabled>Save Lua</button>
                    <button id="updateAllButton" class="styledButton" onclick="updateAll()" disabled>Apply All Changes</button>
                </div>
                <p id="statusText" class="status">No file loaded.</p>
            </section>

            <section id="replacementTool" class="panel">
                <h2>Find and Replace</h2>
                <div class="row">
                    <label for="useRegExp">Use RegExp</label>
                    <input type="checkbox" id="useRegExp">
                </div>
                <div class="controls">
                    <label for="findText">Find</label>
                    <input type="text" id="findText" placeholder="text or expression">
                    <label for="replaceText">Replace with</label>
                    <input type="text" id="replaceText" placeholder="replacement">
                    <button class="styledButton" onclick="replace()">Apply Replace</button>
                </div>
            </section>

            <section class="panel">
                <h2>Quick Navigator</h2>
                <div id="quickNavigator"></div>
            </section>
        </aside>

        <div id="mainContainer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
